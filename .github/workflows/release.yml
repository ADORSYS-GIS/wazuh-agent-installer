name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on any tag like v1.0.0, v1.2.3, etc.

jobs:
  build-tauri:
    permissions:
      contents: write   # needed to create the GitHub Release and upload assets

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: ubuntu-22.04-arm
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Linux system dependencies ─────────────────────────────────────────
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            xdg-utils

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      # ── Build & Release ───────────────────────────────────────────────────
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Wazuh Agent Installer ${{ github.ref_name }}'
          releaseBody: |
            ## Wazuh Agent Installer ${{ github.ref_name }}

            A guided desktop installer for the full Wazuh Agent security stack.

            ### What this installs
            - Wazuh Agent ${{ github.ref_name }}
            - wazuh-cert-oauth2-client
            - wazuh-agent-status
            - YARA integration
            - Suricata (IDS or IPS mode)
            - USB DLP active response scripts
            - Trivy (optional)

            ### Downloads
            | Platform | File |
            |---|---|
            | Linux | `.AppImage` or `.deb` |
            | macOS | `.dmg` (universal — Intel + Apple Silicon) |
            | Windows | `.msi` or `.exe` |

            ### Install
            - **Linux `.deb`**: `sudo dpkg -i wazuh-agent-installer_*.deb`
            - **Linux `.AppImage`**: `chmod +x *.AppImage && ./*.AppImage`
            - **macOS**: Open the `.dmg` and drag to Applications
            - **Windows**: Run the `.msi` installer
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: './src-tauri -> target'

      - name: Install CI tools
        uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4
        with:
          tool: cargo-machete, cargo-nextest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Check formatting
        working-directory: ./src-tauri
        run: cargo fmt --all --check

      - name: Clippy lints
        working-directory: ./src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: ./src-tauri
        run: cargo nextest run --all-targets --all-features --no-tests pass

      - name: Check unused dependencies
        working-directory: ./src-tauri
        run: cargo machete --with-metadata

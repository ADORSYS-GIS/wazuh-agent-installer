name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  ci:
    name: Check on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, ubuntu-22.04-arm]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: './src-tauri -> target'
          shared-key: 'bust-cache-1'

      - name: Install CI tools
        uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4
        with:
          tool: cargo-machete, cargo-nextest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Check formatting
        working-directory: ./src-tauri
        run: cargo fmt --all --check

      - name: Clippy lints
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ./src-tauri
        run: cargo nextest run --no-tests pass

      - name: Check unused dependencies
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: ./src-tauri
        run: cargo machete --with-metadata
